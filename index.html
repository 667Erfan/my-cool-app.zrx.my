<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <style>
        /* استایل کلی بخش خانه */
        .home-container {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0f172a;
            padding: 30px;
            border-radius: 20px;
            color: white;
            width: 800px;
        }

        /* کارت بزرگ اصلی */
        .hero-section {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .welcome-text h2 { margin: 0; font-size: 28px; }
        .welcome-text p { color: #94a3b8; margin-top: 5px; }

        /* دکمه گرافیکی بازی */
        .play-button {
            background: linear-gradient(90deg, #3b82f6, #2563eb);
            color: white;
            padding: 15px 50px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
        }

        .play-button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.6);
        }

        /* کارت‌های آماری کوچک */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .stat-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #334155;
        }

        .stat-number { font-size: 24px; font-weight: bold; display: block; margin-bottom: 5px; }
        .stat-label { color: #94a3b8; font-size: 14px; }
    </style>
</head>
<body>

<div class="home-container">
    <!-- بخش اصلی -->
    <div class="hero-section">
        <div class="welcome-text">
            <h2>سلام HH_amazig</h2>
            <p>آماده پرتاب به دنیای ماینکرفت؟</p>
        </div>
        <button class="play-button">اجرای بازی</button>
    </div>

    <!-- بخش آمار -->
    <div class="stats-row">
        <div class="stat-card">
            <span class="stat-number">2</span>
            <span class="stat-label">سرور ساخته شده</span>
        </div>
        <div class="stat-card">
            <span class="stat-number">0</span>
            <span class="stat-label">نسخه نصب شده</span>
        </div>
        <div class="stat-card">
            <span class="stat-number">1</span>
            <span class="stat-label">پروفایل آماده</span>
        </div>
    </div>
</div>

</body>
</html>
