<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | Zrx Launcher</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* رنگ‌های حالت شب (پیش‌فرض) */
            --bg-color: #0f0f0f;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-color: #ffffff;
            --accent-color: #ff4b2b;
            --secondary-text: #b0b0b0;
            --border-color: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(255, 255, 255, 0.05);
        }

        [data-theme="light"] {
            /* رنگ‌های حالت روز */
            --bg-color: #f0f2f5;
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-color: #1a1a1a;
            --accent-color: #ff416c;
            --secondary-text: #555555;
            --border-color: rgba(0, 0, 0, 0.1);
            --input-bg: rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            transition: all 0.3s ease; /* برای اینکه تغییر تم نرم باشد */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Vazirmatn', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .settings-container {
            width: 90%;
            max-width: 600px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        .settings-header h1 {
            font-size: 1.5rem;
            margin: 0;
        }

        /* دکمه سوئیچ حالت شب و روز */
        .theme-toggle {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            padding: 10px 15px;
            border-radius: 15px;
            color: var(--text-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .theme-toggle:hover {
            background: var(--accent-color);
            color: white;
        }

        /* کلاس‌های کمکی برای بخش‌های بعدی */
        .settings-section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 1.1rem;
            color: var(--accent-color);
            margin-bottom: 15px;
            display: block;
        }

        /* در مرحله بعد بخش‌های داخل این کانتینر را تکمیل می‌کنم */
    </style>
</head>
<body data-theme="dark">

    <div class="settings-container">
        <header class="settings-header">
            <h1>⚙ تنظیمات</h1>
            <button class="theme-toggle" id="themeToggle">
                <span id="themeIcon">☀️</span>
                <span id="themeText">حالت روز</span>
            </button>
        </header>

        <div id="settings-content">
            <!-- بخش‌های بعدی اینجا قرار می‌گیرند -->
        </div>
    </div>

    <script>
        // اسکریپت اولیه برای حالت شب/روز
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const themeText = document.getElementById('themeText');
        const body = document.body;

        // بررسی اینکه آیا کاربر قبلاً تمی را انتخاب کرده است یا خیر
        const savedTheme = localStorage.getItem('theme') || 'dark';
        applyTheme(savedTheme);

        themeToggle.addEventListener('click', () => {
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            applyTheme(newTheme);
        });

        function applyTheme(theme) {
            body.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme); // ذخیره در حافظه

            if (theme === 'light') {
                themeIcon.innerText = '🌙';
                themeText.innerText = 'حالت شب';
            } else {
                themeIcon.innerText = '☀️';
                themeText.innerText = 'حالت روز';
            }
        }
    </script>
</body>
</html>
<!-- این کد را داخل <div id="settings-content"> قرار بده -->

<style>
    /* استایل‌های اختصاصی بخش دوم */
    .settings-section {
        margin-bottom: 35px;
    }

    .section-title {
        font-size: 1.1rem;
        color: var(--accent-color);
        margin-bottom: 15px;
        display: block;
        font-weight: bold;
    }

    /* استایل انتخابگر نسخه (Grid Layout) */
    .version-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
        gap: 15px;
    }

    .version-card {
        background: var(--input-bg);
        border: 1px solid var(--border-color);
        border-radius: 15px;
        padding: 15px 10px;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .version-card:hover {
        border-color: var(--accent-color);
        transform: translateY(-3px);
    }

    .version-card.active {
        background: var(--accent-color);
        color: white;
        border-color: var(--accent-color);
        box-shadow: 0 5px 15px rgba(255, 75, 43, 0.3);
    }

    .version-card img {
        width: 40px;
        height: 40px;
        margin-bottom: 8px;
        display: block;
        margin-left: auto;
        margin-right: auto;
    }

    .version-name {
        font-size: 0.85rem;
        font-weight: bold;
    }

    /* استایل انتخابگر زبان */
    .language-selector {
        display: flex;
        gap: 10px;
    }

    .lang-btn {
        flex: 1;
        background: var(--input-bg);
        border: 1px solid var(--border-color);
        color: var(--text-color);
        padding: 12px;
        border-radius: 12px;
        cursor: pointer;
        font-family: 'Vazirmatn', sans-serif;
        transition: 0.3s;
    }

    .lang-btn.active {
        background: var(--text-color);
        color: var(--bg-color);
        font-weight: bold;
    }
</style>

<!-- بخش انتخاب نسخه -->
<div class="settings-section">
    <span class="section-title">نسخه بازی (Minecraft Version)</span>
    <div class="version-grid" id="versionGrid">
        <!-- نسخه 1.20.1 -->
        <div class="version-card active" data-version="1.20.1">
            <img src="https://minecraft.net/favicon.ico" alt="v"> <!-- اینجا می‌توانی آیکون اختصاصی بگذاری -->
            <div class="version-name">1.20.1</div>
        </div>
        <!-- نسخه 1.19.4 -->
        <div class="version-card" data-version="1.19.4">
            <img src="https://minecraft.net/favicon.ico" alt="v">
            <div class="version-name">1.19.4</div>
        </div>
        <!-- نسخه 1.18.2 -->
        <div class="version-card" data-version="1.18.2">
            <img src="https://minecraft.net/favicon.ico" alt="v">
            <div class="version-name">1.18.2</div>
        </div>
        <!-- نسخه 1.16.5 -->
        <div class="version-card" data-version="1.16.5">
            <img src="https://minecraft.net/favicon.ico" alt="v">
            <div class="version-name">1.16.5</div>
        </div>
    </div>
</div>

<!-- بخش انتخاب زبان -->
<div class="settings-section">
    <span class="section-title">زبان (Language)</span>
    <div class="language-selector">
        <button class="lang-btn active" data-lang="fa">فارسی</button>
        <button class="lang-btn" data-lang="en">English</button>
    </div>
</div>
