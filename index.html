<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <style>
        /* استایل‌های قبلی ثابت است */
        body { background: #0f172a; font-family: Tahoma; color: white; }
        .hero-section { background: #1e293b; padding: 30px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; }
        .play-button { background: #3b82f6; padding: 15px 40px; border: none; border-radius: 12px; color: white; cursor: pointer; }
        .settings-button { background: #475569; padding: 10px 20px; border: none; border-radius: 8px; color: white; cursor: pointer; margin-top: 10px; }

        /* استایل پنجره تنظیمات (Modal) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; }
        .modal-content { background: #1e293b; padding: 30px; border-radius: 20px; width: 400px; }
        .close-btn { cursor: pointer; color: red; float: left; }
    </style>
</head>
<body>

<div class="hero-section">
    <div>
        <h2>سلام HH_amazig</h2>
        <p>آماده پرتاب به دنیای ماینکرفت؟</p>
    </div>
    <div style="display: flex; flex-direction: column;">
        <button class="play-button">اجرای بازی</button>
        <button class="settings-button" onclick="openSettings()">تنظیمات لانچر</button>
    </div>
</div>

<!-- پنجره تنظیمات -->
<div id="settingsModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeSettings()">بستن</span>
        <h3>تنظیمات لانچر</h3>
        <hr>
        <label>مقدار رم اختصاصی (GB):</label>
        <input type="number" value="4" style="width: 100%; margin: 10px 0;">
        
        <label>انتخاب زبان:</label>
        <select style="width: 100%; margin: 10px 0;">
            <option>فارسی</option>
            <option>English</option>
        </select>
        
        <button class="play-button" style="width: 100%; margin-top: 20px;">ذخیره تغییرات</button>
    </div>
</div>

<script>
    function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; }
    function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }
</script>

</body>
</html>
