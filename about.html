<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ШҜШұШЁШ§ШұЩҮ Щ…Ш§ | ZRX Site</title>
    <style>
        /* ЩҲШ§ШұШҜ Ъ©ШұШҜЩҶ ЩҒЩҲЩҶШӘ Ш§ШІ ЪҜЩҲЪҜЩ„ (ШЁЩҮ Ш№ЩҶЩҲШ§ЩҶ Ш¬Ш§ЫҢЪҜШІЫҢЩҶ ШЁШұШ§ЫҢ ШІЫҢШЁШ§ЫҢЫҢ ШЁЫҢШҙШӘШұ) */
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Vazirmatn', sans-serif;
        }

        body {
            /* ЩҫШівҖҢШІЩ…ЫҢЩҶЩҮ ШЁШ§ ЪҜШұШ§ШҜЫҢЩҶШӘ Щ…Щ„Ш§ЫҢЩ… ЩҲ Щ…ШҜШұЩҶ */
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        /* Ш§ЫҢШ¬Ш§ШҜ ШҜШ§ЫҢШұЩҮвҖҢЩҮШ§ЫҢ ШҙЩҶШ§ЩҲШұ ШҜШұ ЩҫШівҖҢШІЩ…ЫҢЩҶЩҮ ШЁШұШ§ЫҢ ШІЫҢШЁШ§ЫҢЫҢ ШЁЫҢШҙШӘШұ */
        .background-circles {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            filter: blur(50px);
            animation: float 10s infinite alternate ease-in-out;
        }

        .circle-1 { width: 300px; height: 300px; top: -10%; left: -10%; background: rgba(0, 212, 255, 0.2); }
        .circle-2 { width: 400px; height: 400px; bottom: -10%; right: -10%; background: rgba(255, 0, 150, 0.2); }

        @keyframes float {
            from { transform: translateY(0) translateX(0); }
            to { transform: translateY(50px) translateX(30px); }
        }

        /* Ъ©Ш§ШұШӘ Ш§ШөЩ„ЫҢ ШЁШ§ Ш§ЩҒЪ©ШӘ ШҙЫҢШҙЩҮвҖҢШ§ЫҢ (Glassmorphism) */
        .about-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 90%;
            transform: translateY(0);
            transition: transform 0.3s ease;
        }

        .about-card:hover {
            transform: translateY(-10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Ш§ШіШӘШ§ЫҢЩ„ Щ…ШӘЩҶвҖҢЩҮШ§ */
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #00d2ff, #928dab);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 1.5rem;
        }

        .creators {
            font-weight: bold;
            color: #fff;
            display: block;
            margin-top: 10px;
            font-size: 1.1rem;
        }

        .footer-text {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 2rem;
            font-style: italic;
        }

        /* Ш§ШіШӘШ§ЫҢЩ„ ШҜЪ©Щ…ЩҮ (Ш§Ш®ШӘЫҢШ§ШұЫҢ) */
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 25px;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.6);
            transform: scale(1.05);
        }

    </style>
</head>
<body>

    <div class="background-circles">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
    </div>

    <div class="about-card">
        <h1>ZRX Site</h1>
        <p>
            Ш§ЫҢЩҶ ЩҲШЁвҖҢШіШ§ЫҢШӘ ШЁШ§ Ш№ШҙЩӮ ЩҲ ШӘЪ©ЩҶЩҲЩ„ЩҲЪҳЫҢ Ш·ШұШ§ШӯЫҢ ШҙШҜЩҮ Ш§ШіШӘ.
            <span class="creators">ШіШ§Ш®ШӘЩҮ ШҙШҜЩҮ ШӘЩҲШіШ· Ш№ШұЩҒШ§ЩҶ ЩҲ Ш§Щ…ЫҢШұ Ш№ШЁШ§Ші</span>
        
        </p>
        <p class="footer-text">ШіЩҫШ§ШіЪҜШІШ§ШұЫҢЩ… Ъ©ЩҮ ШҜШұ ШіШ§ЫҢШӘ Щ…Ш§ ЩҮШіШӘЫҢШҜ вқӨпёҸ</p>
        
        <a href="#" class="btn">ШЁШ§ШІЪҜШҙШӘ ШЁЩҮ Ш®Ш§ЩҶЩҮ</a>
    </div>

</body>
