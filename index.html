<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; font-family: Tahoma, sans-serif; display: flex; background: #f4f7f6; height: 100vh; }
        
        /* سایدبار */
        .sidebar { width: 250px; background: #fff; border-left: 1px solid #ddd; padding: 20px; }
        
        /* محتوای اصلی */
        .main-content { flex: 1; padding: 20px; }
        
        /* کارت اصلی (هدر بازی) */
        .hero-banner { background: #2c3e50; color: white; padding: 40px; border-radius: 15px; margin-bottom: 20px; }
        
        /* گرید وضعیت */
        .stats-grid { display: flex; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; flex: 1; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        
        .btn-play { background: #3498db; color: white; padding: 10px 30px; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h3>میهن کرفت</h3>
        <ul>
            <li>خانه</li>
            <li>پروفایل‌ها</li>
            <li>نسخه‌ها</li>
        </ul>
    </div>

    <div class="main-content">
        <div class="hero-banner">
            <h1>سلام بر تو</h1>
            <p>آماده پرتاب به دنیای ماینکرفت؟</p>
            <button class="btn-play">اجرای بازی</button>
        </div>

        <div class="stats-grid">
            <div class="card">۲ <br> سرور ساخته شده</div>
            <div class="card">۰ <br> نسخه نصب شده</div>
            <div class="card">۱ <br> پروفایل آماده</div>
        </div>
    </div>

</body>
</html>
